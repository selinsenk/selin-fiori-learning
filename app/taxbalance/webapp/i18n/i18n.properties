# i18n.properties  -  translatable texts
#
# Any text wrapped in {{double braces}} in manifest.json is looked up here.
# To add a language you create i18n_de.properties, i18n_tr.properties, ... and
# UI5 picks the right one from the browser/user language automatically.
#
# ABAP equivalent: the text elements of a class/report, or the label of a data
# element in the DDIC, translated via transaction SE63.

